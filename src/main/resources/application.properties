spring.application.name=auth-server

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth-server}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:temporary-development-secret-key-which-is-long-enough-for-hs256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}